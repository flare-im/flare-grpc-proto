syntax = "proto3";

package flare.message.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "ack.proto";
import "enums.proto";
import "errors.proto";
import "event.proto";
import "metadata.proto";
import "message.proto";
import "message_content.proto";
import "models.proto";
import "data.proto";

// =============================================================================
// Message 域（发送 / 事件 / 操作；单条/列表/搜索等读模型由 Storage Reader 服务提供）
// =============================================================================
// 业务侧 gRPC，不直接使用 PayloadCommand。上行发消息/事件、下行回执由网关封装为 PayloadCommand(MESSAGE/EVENT/ACK)。
// 复用 common：Message、Event、Ack、Pagination。
//
// MessageSendService 与 signaling/router.proto 的 RouterUpstreamService 对齐（网关 Route* → 业务编排）：
// - SendMessage / BatchSendMessage ↔ RouteMessage（上行 MESSAGE）
// - SendAck ↔ RouteAck（上行客户端 ACK：Push / Conversation / Batch）
// - SendCustomData ↔ RouteData（上行 CustomData / USER_CUSTOM）
// MessageEventService 单独承接事件命令：
// - ExecuteEvent ↔ RouteEvent（上行 EVENT）

// ----------------------------------------------------------------------------
// 服务
// ----------------------------------------------------------------------------

// MessageSendService：发送消息、批量发送、系统消息、上行 ACK、上行 CustomData
service MessageSendService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);  // 发送消息（↔ RouteMessage）
  rpc BatchSendMessage(BatchSendMessageRequest) returns (BatchSendMessageResponse);  // 批量发送
  rpc SendSystemMessage(SendSystemMessageRequest) returns (SendSystemMessageResponse);  // 系统消息
  rpc SendAck(SendAckRequest) returns (SendAckResponse);  // 上行客户端 ACK（↔ RouteAck）
  rpc SendCustomData(SendCustomDataRequest) returns (SendCustomDataResponse);  // 上行 CustomData（↔ RouteData）
}

// MessageEventService：上行操作事件入口，由 orchestrator 持有事件编排职责
service MessageEventService {
  rpc ExecuteEvent(ExecuteEventRequest) returns (google.protobuf.Empty);  // 上行操作事件（↔ RouteEvent）
}

// MessageActionService：撤回/编辑/删除、反应、置顶、标记
service MessageActionService {
  rpc RecallMessage(RecallMessageRequest) returns (RecallMessageResponse);  // 撤回
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);  // 编辑
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);  // 删除
  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);  // 添加反应
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);  // 移除反应
  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);  // 置顶
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);  // 取消置顶
  rpc MarkMessage(MarkMessageRequest) returns (MarkMessageResponse);  // 标记
  rpc UnmarkMessage(UnmarkMessageRequest) returns (UnmarkMessageResponse);  // 取消标记
}

// ----------------------------------------------------------------------------
// MessageSendService（发送）
// ----------------------------------------------------------------------------

// 发送消息请求
message SendMessageRequest {
  string conversation_id = 1;  // 会话 ID，格式 {conversation_type}:{id}
  flare.common.v1.Message message = 2;  // 消息内容，单条最大 64KB
  bool sync = 3;  // 是否同步等待持久化，默认 false
  string svid = 4;  // 业务系统标识（与 RouterUpstream.RouteMessageRequest.svid 对齐），可空表示默认
}

// 发送消息响应
message SendMessageResponse {
  bool success = 1;  // 是否成功；实际可靠性边界以 durability 为准
  string server_msg_id = 2;  // 服务端消息 ID（全局唯一）
  uint64 conversation_seq = 3;  // 会话 replay 序号
  google.protobuf.Timestamp sent_at = 4;  // 发送时间
  flare.common.v1.MessageTimeline timeline = 5;  // 时间线（持久化/投递/已读等）
  flare.common.v1.SendAckDurability durability = 6;  // 成功 ACK 已跨过的最高可靠性边界

  reserved "seq";
}

// 批量发送消息请求
message BatchSendMessageRequest {
  repeated SendMessageRequest messages = 1;  // 请求列表，最多 100 条，每条经 PreSend Hook
}

// 批量发送消息响应
message BatchSendMessageResponse {
  int32 success_count = 1;  // 成功数
  int32 fail_count = 2;  // 失败数
  repeated SendMessageResponse successes = 3;  // 成功详情（按请求顺序）
  repeated FailedMessage failures = 4;  // 失败详情
}

// 失败的消息详情
message FailedMessage {
  string message_id = 1;  // 消息 ID（若已生成）
  int32 code = 2;  // 错误码
  string error_message = 3;  // 错误描述
}

// 发送系统消息请求
message SendSystemMessageRequest {
  string conversation_id = 1;  // 会话 ID，格式 {conversation_type}:{conversation_id}，必填
  flare.common.v1.Message message = 2;  // 消息内容，必填，须含 conversation_id
  string system_message_type = 3;  // 系统消息类型，如 group_dissolve、member_quit，必填
}

// 发送系统消息响应
message SendSystemMessageResponse {
  bool success = 1;  // 是否发送成功
  string message_id = 2;  // 消息 ID（成功时返回）
}

// MessageEventService（事件）
// ----------------------------------------------------------------------------

// 执行操作事件请求（与 RouterUpstream.RouteEventRequest 对齐）
message ExecuteEventRequest {
  string svid = 1;  // 业务系统标识，如 svid.im
  flare.common.v1.Event event = 2;  // 领域事件（撤回/编辑/已读等）
}

// ----------------------------------------------------------------------------
// MessageSendService（ACK / CustomData）
// ----------------------------------------------------------------------------

// 上行客户端 ACK 请求（与 RouterUpstream.RouteAckRequest 对齐）
message SendAckRequest {
  string svid = 1;
  flare.common.v1.Ack ack = 2;
}

message SendAckResponse {
  string routed_endpoint = 1;  // 可选，实际处理端点（监控/调试）
}

// 上行 CustomData 请求（与 RouterUpstream.RouteDataRequest 对齐）
message SendCustomDataRequest {
  string svid = 1;
  flare.common.v1.CustomData data = 2;
}

message SendCustomDataResponse {
  bytes response_data = 1;  // 可选：下游返回的扩展载荷
  string routed_endpoint = 2;
}

// ----------------------------------------------------------------------------
// 消息操作
// ----------------------------------------------------------------------------

// 撤回消息请求（与 common/event.proto MessageRecallEvent 对齐；operator_id 由 metadata 注入）
message RecallMessageRequest {
  string message_id = 1;  // 即 server_msg_id，必填
  string reason = 2;
  int32 recall_time_limit_seconds = 3;  // 可选，不填用系统默认
  string conversation_id = 4;  // 可选；当服务端未配置 StorageReader 时由客户端提供，用于解析会话
}

// 撤回消息响应
message RecallMessageResponse {
  bool success = 1;  // 是否撤回成功
  string error_message = 2;  // 失败时错误描述
  google.protobuf.Timestamp recalled_at = 3;  // 撤回时间
}

// 删除消息请求（与 MessageDeleteEvent 对齐；operator 由 metadata 注入）
message DeleteMessageRequest {
  string conversation_id = 1;
  repeated string message_ids = 2;  // 最多 100
  flare.common.v1.DeleteType delete_type = 3;
  string reason = 4;
  bool notify_others = 5;
  optional flare.common.v1.DeleteScope scope = 6;  // 未传时：soft->USER_PRIVATE, hard->CONVERSATION_GLOBAL
}

// 删除消息响应
message DeleteMessageResponse {
  bool success = 1;  // 是否删除成功（至少一条）
  int32 deleted_count = 2;  // 实际删除条数
}

// 编辑消息请求（与 MessageEditEvent 对齐；operator_id 由 metadata 注入）
message EditMessageRequest {
  string message_id = 1;
  flare.common.v1.MessageContent new_content = 2;
  int32 edit_version = 3;
  string reason = 4;
  bool show_edited_mark = 5;
  string conversation_id = 6;  // 可选；当服务端未配置 StorageReader 时由客户端提供，用于解析会话
}

// 编辑消息响应
message EditMessageResponse {
  bool success = 1;  // 是否编辑成功
  string error_message = 2;  // 失败时错误描述
  string message_id = 3;  // 消息 ID（与请求一致）
  int32 edit_version = 4;  // 更新后编辑版本号
  google.protobuf.Timestamp edited_at = 5;  // 编辑时间
}

// 添加表情反应请求（与 ReactionEvent 对齐；user_id 由 metadata 注入）
message AddReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

// 添加表情反应响应
message AddReactionResponse {
  bool success = 1;  // 是否成功
  string error_message = 2;  // 错误描述
  int32 new_count = 3;  // 该表情当前数量
}

// 移除表情反应请求（user_id 由 metadata 注入）
message RemoveReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

// 移除表情反应响应
message RemoveReactionResponse {
  bool success = 1;  // 是否成功
  string error_message = 2;  // 错误描述
  int32 new_count = 3;  // 该表情当前数量
}

// 回复/引用：通过 Message.quote（quoted_message_id 必填等）建新消息后 SendMessage。转发：用 ForwardContent 建新消息后 SendMessage。话题回复：attributes["thread_id"]；话题根：message_type=MESSAGE_TYPE_THREAD + content.thread。

// ----------------------------------------------------------------------------
// 置顶消息相关
// ----------------------------------------------------------------------------

// 置顶消息请求（与 PinEvent 对齐；operator_id 由 metadata 注入）
message PinMessageRequest {
  string message_id = 1;
  string reason = 2;
  google.protobuf.Timestamp expire_at = 3;
  flare.common.v1.MessagePinScope scope = 4;
}

// 置顶消息响应
message PinMessageResponse {
  bool success = 1;  // 是否置顶成功
  string error_message = 2;  // 错误描述
  google.protobuf.Timestamp pinned_at = 3;  // 置顶时间
}

// 取消置顶请求（与 UnpinEvent 对齐；operator_id 由 metadata 注入）
message UnpinMessageRequest {
  string message_id = 1;
  flare.common.v1.MessagePinScope scope = 2;
}

// 取消置顶响应
message UnpinMessageResponse {
  bool success = 1;  // 是否取消成功
  string error_message = 2;  // 错误描述
}

// ----------------------------------------------------------------------------
// 标记消息相关
// ----------------------------------------------------------------------------

// 标记消息请求（与 MarkEvent 对齐；user_id 由 metadata 注入）
message MarkMessageRequest {
  string message_id = 1;
  flare.common.v1.MarkType mark_type = 2;
  string color = 3;
}

// 标记消息响应
message MarkMessageResponse {
  bool success = 1;  // 是否标记成功
  string error_message = 2;  // 错误描述
  google.protobuf.Timestamp marked_at = 3;  // 标记时间
}

// 取消标记请求（与 UnmarkEvent 对齐；user_id 由 metadata 注入）
message UnmarkMessageRequest {
  string message_id = 1;
  flare.common.v1.MarkType mark_type = 2;  // 空表示取消该消息全部标记
}

// 取消标记响应
message UnmarkMessageResponse {
  bool success = 1;  // 是否取消成功
  string error_message = 2;  // 错误描述
}
